<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <title>OMNIS Consultoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="nav" id="nav">
    <div class="nav__container container">
      <a href="#inicio" class="nav__logo">

      <nav class="nav__links" id="navLinks" aria-label="Principal">

      </nav>
      <button class="nav__hamburger" id="hamburger" aria-label="Abrir menu" aria-expanded="false" aria-controls="navLinks">
        <span></span><span></span><span></span>
      </button>
    </div>

  <section class="hero" id="inicio">
    <div class="hero__bg"></div>
    <div class="container hero__content">
      <h1 class="hero__title">Consultoria que age<br />junto com você.</h1>
      <p class="hero__subtitle">
        Diagnóstico, reestruturação e execução econômico-financeira

      <a href="#contato" class="btn btn--outline">Fale Conosco</a>
